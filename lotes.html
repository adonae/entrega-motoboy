<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todos os Lotes</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="flex justify-between items-center" style="margin-bottom: 2rem">
        <div>
          <h1>Todos os Lotes</h1>
          <p class="text-muted">Lotes de entregas criados</p>
        </div>
        <nav class="flex">
          <a href="index.html" class="btn btn-secondary">Painel</a>
          <a href="rota.html" class="btn btn-secondary">Rota do dia</a>
        </nav>
      </header>
      <div class="card">
        <ul id="lista-lotes" class="list-clean">
          <li class="loading">Carregando lotes...</li>
        </ul>
      </div>
    </div>

    <div id="modal-excluir" class="modal-overlay hidden">
      <div class="modal">
        <p id="modal-mensagem" style="margin-bottom: 1rem; font-weight: 500;"></p>
        <div style="display: flex; gap: 0.5rem; justify-content: flex-end; flex-wrap: wrap;">
          <button id="btn-modal-excluir" class="btn btn-danger">Excluir lote</button>
          <button id="btn-modal-liberar" class="btn btn-warning">Voltar pedidos ao painel</button>
          <button id="btn-modal-cancelar" class="btn btn-secondary">Cancelar</button>
        </div>
      </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script type="module" src="js/pages/lotes.js"></script>
  </body>
</html>
