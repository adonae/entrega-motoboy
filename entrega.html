<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirmar Entrega</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="container">
      <header style="margin-bottom: 2rem">
        <a href="index.html" class="btn btn-secondary">Voltar ao painel</a>
        <h1>Confirmar Entrega</h1>
      </header>

      <div class="card hidden" id="card-entrega">
        <p class="loading">Carregando entrega...</p>
      </div>

      <div class="card" id="card-confirmacao">
        <h2>Detalhes da Entrega</h2>
        <div id="detalhes-entrega" class="mt-1"></div>
        <div class="delivery-actions mt-1" id="acoes-entrega">
          <a href="index.html" id="btn-editar-entrega" class="btn btn-secondary">Editar</a>
          <button type="button" id="btn-excluir-entrega" class="btn btn-danger">
            Excluir
          </button>
        </div>
        <form id="form-confirmar" class="flex flex-col mt-1">
          <div class="form-group">
            <label for="obs-entrega">Observacoes da entrega</label>
            <textarea id="obs-entrega" class="form-control" rows="3"></textarea>
          </div>
          <button type="submit" id="btn-confirmar" class="btn btn-success">
            Confirmar Entrega
          </button>
        </form>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script type="module" src="js/pages/entrega.js"></script>
  </body>
</html>
